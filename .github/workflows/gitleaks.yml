name: Secret scan (gitleaks)

# Guardrail for a source-available repo: fail the build if a secret is ever
# committed. Scans the full history on each push/PR so nothing slips in once the
# repo is public. Complements the pre-commit secrets lens (which runs locally).
# Uses the pinned gitleaks binary directly to avoid the gitleaks-action's
# org-license requirement.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, not just the tip — that's the point

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version

      - name: Scan history
        run: ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose
