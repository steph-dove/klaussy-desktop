name: Build platform artifacts

# Builds Linux + Windows artifacts on each native runner (cross-compile from
# Mac is blocked by node-gyp's no-cross-compile-source rule for node-pty).
# Mac is built locally where the signing/notarization creds live, so this
# workflow deliberately doesn't run on macos-latest.
#
# Triggered manually via `gh workflow run build-platforms.yml` or the GitHub
# UI — keeps the runner-minute cost out of the every-PR CI loop.

on:
  workflow_dispatch:
    inputs:
      sign:
        description: 'Sign Windows build via SSL.com eSigner (set false to produce an unsigned .exe for local signing)'
        type: boolean
        default: true
      release_tag:
        description: 'If set (e.g. v0.2.7), upload the built artifacts to that release on klaussy-desktop-feedback. Requires the FEEDBACK_REPO_TOKEN secret. Leave blank to only upload to GitHub Actions artifacts.'
        type: string
        default: ''

# contents:write lets the default GITHUB_TOKEN attach artifacts to a release on
# THIS repo (klaussy-desktop) — the canonical release home. The feedback-repo
# upload still needs the cross-repo FEEDBACK_REPO_TOKEN PAT.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact_glob: |
              dist/Klaussy-*.AppImage
              dist/Klaussy-*.deb
              dist/latest-linux.yml
          # Pinned to windows-2022: `windows-latest` rotated to a newer image
          # whose Visual Studio the bundled node-gyp doesn't detect ("Could
          # not find any Visual Studio installation"), breaking the node-pty
          # native rebuild. 2022 has the VS toolchain node-gyp understands.
          - os: windows-2022
            script: dist:win
            artifact_glob: |
              dist/Klaussy-*.exe
              dist/latest.yml
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Set up Java for CodeSignTool
        if: runner.os == 'Windows'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download SSL.com CodeSignTool
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Pull from GitHub releases — SSL.com's download page mirrors an older
          # version that lacks the -otp flag we use in build/win-sign.js.
          $url = 'https://github.com/SSLcom/CodeSignTool/releases/download/v1.3.2/CodeSignTool-v1.3.2-windows.zip'
          $zip = "$env:RUNNER_TEMP\CodeSignTool.zip"
          $dest = "$env:RUNNER_TEMP\CodeSignTool"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $toolDir = Get-ChildItem -Path $dest -Recurse -Filter 'CodeSignTool.bat' | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          if (-not $toolDir) { throw 'CodeSignTool.bat not found in download' }
          echo "CODESIGNTOOL_PATH=$toolDir" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          # Linux ships unsigned (no convention). Windows uses build/win-sign.js
          # against SSL.com eSigner — disable electron-builder's auto-discovery so
          # it doesn't try a local .pfx.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ESIGNER_USERNAME: ${{ inputs.sign && secrets.ESIGNER_USERNAME || '' }}
          ESIGNER_PASSWORD: ${{ inputs.sign && secrets.ESIGNER_PASSWORD || '' }}
          ESIGNER_TOTP_SECRET: ${{ inputs.sign && secrets.ESIGNER_TOTP_SECRET || '' }}
          ESIGNER_CREDENTIAL_ID: ${{ inputs.sign && secrets.ESIGNER_CREDENTIAL_ID || '' }}

      # Best-effort upload to GH Actions artifact cache (14-day retention for
      # ad-hoc debugging). The canonical destination is the klaussy-desktop
      # release below, so don't fail the run if this step hits storage quota.
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        continue-on-error: true
        with:
          name: ${{ matrix.os }}-${{ github.sha }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

      # When release_tag is set, attach the built artifacts directly to the
      # release on klaussy-desktop (the canonical home) so the auto-updater
      # (which, as of v0.7.0, polls this repo) and end users get a download
      # link without a manual "trigger CI → grab artifacts → re-upload" step.
      #
      # Auth: the default GITHUB_TOKEN writes to this repo (see permissions
      # block above) — no PAT needed.
      - name: Upload artifacts to klaussy-desktop release
        if: ${{ always() && inputs.release_tag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `gh release upload --clobber` so re-running the workflow on the same
          # tag overwrites prior artifacts instead of failing.
          mapfile -t files < <(ls dist/Klaussy-*.exe dist/Klaussy-*.AppImage dist/Klaussy-*.deb dist/latest.yml dist/latest-linux.yml 2>/dev/null || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::warning::No platform artifacts found in dist/; nothing to upload."
            exit 0
          fi
          gh release upload "${{ inputs.release_tag }}" "${files[@]}" \
            --repo steph-dove/klaussy-desktop \
            --clobber

      # MIGRATION BRIDGE (temporary): clients installed at v0.6.0 and earlier
      # still poll klaussy-desktop-feedback for updates, so mirror this release
      # there too. Once v0.7.0 (which polls klaussy-desktop) is broadly
      # installed, this step can be deleted.
      #
      # Auth: GITHUB_TOKEN can't write to a different repo. A fine-scoped PAT
      # stored as FEEDBACK_REPO_TOKEN (contents:write on klaussy-desktop-feedback,
      # nothing else) is required. Without it the step is skipped.
      - name: Mirror artifacts to feedback release (migration bridge)
        if: ${{ always() && inputs.release_tag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.FEEDBACK_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::release_tag was provided but FEEDBACK_REPO_TOKEN is not set; skipping feedback-repo mirror."
            exit 0
          fi
          mapfile -t files < <(ls dist/Klaussy-*.exe dist/Klaussy-*.AppImage dist/Klaussy-*.deb dist/latest.yml dist/latest-linux.yml 2>/dev/null || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::warning::No platform artifacts found in dist/; nothing to mirror."
            exit 0
          fi
          gh release upload "${{ inputs.release_tag }}" "${files[@]}" \
            --repo steph-dove/klaussy-desktop-feedback \
            --clobber
