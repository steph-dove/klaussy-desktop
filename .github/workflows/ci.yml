name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref when a new commit lands. Saves
# macOS minutes (which bill at 10x rate) when someone force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # node-pty is a native module that needs to be rebuilt against the
      # Electron ABI before either the app or the e2e suite can spawn a pty.
      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
