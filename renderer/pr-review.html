<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
  <title>Klaussy — Review</title>
  <!-- styles.css was split into ordered partials; load order preserves the cascade. -->
  <link rel="stylesheet" href="styles/01-base.css">
  <link rel="stylesheet" href="styles/02-toolbar-diff.css">
  <link rel="stylesheet" href="styles/03-pr.css">
  <link rel="stylesheet" href="styles/04-editor.css">
  <link rel="stylesheet" href="styles/05-pr-review-surface.css">
</head>
<body class="pr-review-popout">
  <div id="pr-review-root"></div>
  <!-- Theme must load + init here too: this popout is a separate window with
       its own document, so it has to read the shared theme from config and
       apply the CSS variables itself. Without it the popout falls back to the
       dark defaults in 01-base.css regardless of the main window's theme. -->
  <script src="theme.js"></script>
  <script src="utils.js"></script>
  <script src="toast.js"></script>
  <!-- Markdown rendering for comment bodies (markdown-it + DOMPurify are UMD;
       load before any AMD loader so they register as window globals). -->
  <script src="../node_modules/markdown-it/dist/markdown-it.min.js"></script>
  <script src="../node_modules/dompurify/dist/purify.min.js"></script>
  <script src="hljs-bundle.js"></script>
  <script src="markdown-preview.js"></script>
  <script src="finding-parser.js"></script>
  <script src="pr-review.js"></script>
  <script src="pr-review-findings.js"></script>
  <script src="pr-review-terminal.js"></script>
  <script src="pr-review-implement.js"></script>
  <script src="pr-review-conversation.js"></script>
  <script src="pr-review-checks.js"></script>
  <script>
    // Read the shared theme from config and apply it before/while mounting so
    // the popout matches the main window (init() is async but applies the CSS
    // variables as soon as it resolves; pr-review.js also listens for the
    // 'theme-changed' event it dispatches).
    if (window.ThemeManager && ThemeManager.init) ThemeManager.init();
    // Host is the window itself; no other renderer modules are loaded here.
    window.PrReview.mount({
      host: document.getElementById('pr-review-root'),
      isPopout: true,
    });
  </script>
</body>
</html>
