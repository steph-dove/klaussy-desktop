<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
  <title>Klaussy — Review</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="pr-review-popout">
  <div id="pr-review-root"></div>
  <script src="utils.js"></script>
  <script src="toast.js"></script>
  <script src="pr-review.js"></script>
  <script>
    // Host is the window itself; no other renderer modules are loaded here.
    window.PrReview.mount({
      host: document.getElementById('pr-review-root'),
      isPopout: true,
    });
  </script>
</body>
</html>
