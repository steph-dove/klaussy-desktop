<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
  <title>Klaussy</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f1a; height: 100vh; overflow: hidden; }
    #popout-header {
      height: 32px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #888;
      -webkit-app-region: drag;
      gap: 8px;
    }
    #popout-header .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #00e676;
    }
    #popout-header .task-name {
      font-weight: 600; color: #e0e0e0;
    }
    #popout-terminal {
      position: absolute;
      top: 32px; left: 0; right: 0; bottom: 0;
      padding: 4px;
    }
  </style>
</head>
<body>
  <div id="popout-header">
    <span class="dot"></span>
    <span class="task-name" id="popout-name">Task</span>
    <span id="popout-branch"></span>
  </div>
  <div id="popout-terminal"></div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="popout.js"></script>
</body>
</html>
